<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand — 品牌選擇 | SonaSNS</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #2c3e50;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    .site-nav {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }

    .site-nav a {
        padding: 10px 22px;
        border: 2px solid #667eea;
        background: white;
        color: #667eea;
        border-radius: 25px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s;
    }

    .site-nav a.active { background: #667eea; color: white; }

    .site-nav a:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    header { text-align: center; margin-bottom: 36px; }

    header h1 {
        font-size: 2.6em;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    header p { color: #5a6c7d; font-size: 1.05em; }

    .brand-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }

    .brand-card {
        display: block;
        background: white;
        border-radius: 16px;
        padding: 28px;
        text-decoration: none;
        color: inherit;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        border-top: 4px solid #667eea;
        transition: all 0.25s;
    }

    .brand-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 28px rgba(102, 126, 234, 0.25);
    }

    .brand-card.soon {
        opacity: 0.55;
        border-top-color: #b8c2d0;
        cursor: default;
    }
    .brand-card.soon:hover { transform: none; box-shadow: 0 6px 20px rgba(0,0,0,0.06); }

    .brand-card .emoji { font-size: 2.4em; }
    .brand-card h2 { font-size: 1.5em; margin: 8px 0 6px; color: #2c3e50; }
    .brand-card .tagline { color: #667eea; font-weight: 600; font-size: 0.92em; margin-bottom: 10px; }
    .brand-card .desc { color: #777; font-size: 0.9em; line-height: 1.5; }
    .brand-card .enter { color: #667eea; font-weight: 700; margin-top: 14px; display: inline-block; }
    .brand-card .badge { color: #a0a8b3; font-weight: 600; font-size: 0.85em; margin-top: 14px; display: inline-block; }

    footer {
        text-align: center;
        color: #7f8c8d;
        font-size: 0.9em;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 2px solid rgba(255, 255, 255, 0.5);
    }
</style>
</head>
<body>
<div class="container">
    <div class="site-nav">
        <a href="index.html">📅 首頁</a>
        <a href="brand.html" class="active">🏢 BRAND</a>
        <a href="tools.html">🧰 工具</a>
    </div>

    <header>
        <h1>Brand</h1>
        <p>選擇品牌，查看品牌介紹與廣告成效報告</p>
    </header>

    <div class="brand-grid">
        <a class="brand-card" href="okiblues.html">
            <div class="emoji">🚗</div>
            <h2>OKIBLUES</h2>
            <div class="tagline">沖繩最大中文租車品牌</div>
            <div class="desc">品牌概覽、核心賣點與 Meta 廣告成效互動報告。</div>
            <span class="enter">進入品牌頁 →</span>
        </a>

        <a class="brand-card" href="okiplayground.html">
            <div class="emoji">🎡</div>
            <h2>OKIPLAYGROUND</h2>
            <div class="tagline">沖繩華人旅遊資訊平台</div>
            <div class="desc">品牌概覽、社群定位與自然發文成效報告。</div>
            <span class="enter">進入品牌頁 →</span>
        </a>

        <div class="brand-card soon">
            <div class="emoji">🎵</div>
            <h2>The Blues</h2>
            <div class="tagline">—</div>
            <div class="desc">品牌頁準備中。</div>
            <span class="badge">準備中</span>
        </div>
    </div>

    <footer>
        <p>SonaSNS 內部品牌中心 · 對外客戶版見 brand repo</p>
    </footer>
</div>
</body>
</html>
