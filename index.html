<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonaSNS — 每日帖文預覽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1em;
            color: #555;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .post-card.okip {
            border-left-color: #f39c12;
        }

        .post-card.blues {
            border-left-color: #3498db;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .post-date {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
        }

        .post-platform {
            display: inline-block;
            padding: 5px 12px;
            background: #ecf0f1;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            color: #2c3e50;
        }

        .post-platform.okip {
            background: #fef3e2;
            color: #f39c12;
        }

        .post-platform.blues {
            background: #e3f2fd;
            color: #3498db;
        }

        .post-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .post-meta-item {
            padding: 5px 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85em;
            color: #555;
        }

        .post-type {
            font-weight: 600;
            color: #667eea;
        }

        .post-content {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

        .post-content p {
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .post-preview {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
            color: #555;
            margin: 10px 0;
            max-height: 120px;
            overflow: hidden;
        }

        .hashtags {
            margin: 12px 0;
            font-size: 0.9em;
        }

        .hashtags a {
            color: #667eea;
            text-decoration: none;
            margin-right: 8px;
        }

        .hashtags a:hover {
            text-decoration: underline;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
        }

        .btn-disabled {
            background: #bdc3c7;
            color: white;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-待起稿 {
            background: #ffe5e5;
            color: #c0392b;
        }

        .status-待確認 {
            background: #fff3e0;
            color: #d68910;
        }

        .status-已確認 {
            background: #e8f5e9;
            color: #27ae60;
        }

        .status-已發佈 {
            background: #e3f2fd;
            color: #2980b9;
        }

        footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        @media (max-width: 768px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .filters {
                justify-content: flex-start;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 SonaSNS 每日帖文預覽</h1>
            <p>OKIBLUES × OKIPLAYGROUND × The Blues — 內容排程中心</p>
        </header>

        <div class="filters">
            <button class="filter-btn active" onclick="filterPosts('all')">📋 全部</button>
            <button class="filter-btn" onclick="filterPosts('OB')">🚗 OKIBLUES</button>
            <button class="filter-btn okip" onclick="filterPosts('OKIP')">🏝️ OKIPLAYGROUND</button>
            <button class="filter-btn blues" onclick="filterPosts('The Blues')">🤿 The Blues</button>
        </div>

        <div class="posts-grid" id="postsContainer">
            <div class="empty-state">⏳ 正在加載排程...</div>
        </div>

        <footer>
            <p>💡 提示：點「📥 下載媒體」可下載該天的資源 | 👉 編輯帖文請到 <a href="https://docs.google.com/spreadsheets/d/1gTbG5il6CtomkTfRXmFXwx7_4AIG8CjOnfsdoRynuS4" target="_blank" style="color: #667eea;">Google Sheet</a></p>
            <p>最後更新：<span id="lastUpdate">加載中...</span></p>
        </footer>
    </div>

    <script>
        // 模擬數據 - 實際應該從 Google Sheet API 讀取
        const posts = [
            {
                date: '2026/06/14',
                weekday: '六',
                platform: 'OB',
                topic: 'Serena',
                type: 'YT影片帖',
                content: '🎬 一台七人座的真實問題，我們開出來讓你看 🎬\n租 Serena 之前，被問最多的三件事：「空間真的夠嗎？」「長輩上下車方便嗎？」「大車好不好開？」',
                hashtags: ['#NissanSerena', '#OKIBLUES', '#沖繩自駕', '#家庭旅遊'],
                mediaUrl: 'https://youtu.be/WNQ0ikXp4rE',
                driveLink: 'https://drive.google.com/drive/folders/OkiMac/SonaSNS_Media',
                status: '已發佈'
            },
            {
                date: '2026/06/15',
                weekday: '日',
                platform: 'OKIP',
                topic: '古宇利島',
                type: '沖繩一眼景',
                content: '🏝️ 今天的沖繩，是一條通往海的橋 🏝️\n有些地方不是一定要去做什麼才成立。古宇利島就是其中一個☀️',
                hashtags: ['#沖繩一眼景', '#OKIPLAYGROUND', '#古宇利島'],
                mediaUrl: null,
                driveLink: 'https://drive.google.com/drive/folders/OkiMac/SonaSNS_Media',
                status: '待確認'
            },
            {
                date: '2026/06/18',
                weekday: '三',
                platform: 'OB',
                topic: 'Freed 3代',
                type: 'FB規格帖',
                content: '🚗 全新 Honda Freed 第三代 — 家庭出遊的剛剛好選擇\n想找一台「不會開起來很吃力、空間又夠用」的家庭車？',
                hashtags: ['#HondaFreed', '#OKIBLUES', '#沖繩租車'],
                mediaUrl: null,
                driveLink: 'https://drive.google.com/drive/folders/OkiMac/SonaSNS_Media',
                status: '待確認'
            },
            {
                date: '2026/06/19',
                weekday: '四',
                platform: 'OB',
                topic: '機場接送',
                type: 'FB規格帖',
                content: '🚗 沖繩機場接送，選對車差很大\n從機場到飯店，看起來只是短短一段路，但選錯車，全家一上車就開始後悔。',
                hashtags: ['#OKIBLUES', '#沖繩接送', '#機場租車'],
                mediaUrl: null,
                driveLink: 'https://drive.google.com/drive/folders/OkiMac/SonaSNS_Media',
                status: '待起稿'
            },
            {
                date: '2026/06/21',
                weekday: '日',
                platform: 'OKIP',
                topic: '今天是夏至',
                type: '今天是',
                content: '🌞 今天是沖繩最長的白晝 ☀️\n沖繩的夏至不只是「白晝最長」這麼簡單。本島各地會舉辦夏至祭',
                hashtags: ['#沖繩遊樂園', '#夏至', '#沖繩夏天'],
                mediaUrl: null,
                driveLink: 'https://drive.google.com/drive/folders/OkiMac/SonaSNS_Media',
                status: '待起稿'
            },
            {
                date: '2026/06/21',
                weekday: '日',
                platform: 'OB',
                topic: 'Sienta 3代',
                type: 'FB帖文帖',
                content: '🚗 小家庭暑假出遊首選：全新 Suzuki Sienta 3 代來了！\n找一台「剛剛好」的家庭車？不用 7 人座那麼大，但空間比小型車寬敞',
                hashtags: ['#SuzukiSienta', '#OKIBLUES', '#小家庭出遊'],
                mediaUrl: null,
                driveLink: 'https://drive.google.com/drive/folders/OkiMac/SonaSNS_Media',
                status: '待起稿'
            }
        ];

        function renderPosts(filtered = 'all') {
            const container = document.getElementById('postsContainer');

            const filtered_posts = filtered === 'all'
                ? posts
                : posts.filter(p => p.platform === filtered);

            if (filtered_posts.length === 0) {
                container.innerHTML = '<div class="empty-state">❌ 沒有符合條件的帖文</div>';
                return;
            }

            container.innerHTML = filtered_posts.map(post => `
                <div class="post-card ${post.platform === 'OKIP' ? 'okip' : post.platform === 'The Blues' ? 'blues' : ''}">
                    <div class="post-header">
                        <div>
                            <div class="post-date">${post.date} (${post.weekday})</div>
                        </div>
                        <span class="post-platform ${post.platform === 'OKIP' ? 'okip' : post.platform === 'The Blues' ? 'blues' : ''}">${post.platform}</span>
                    </div>

                    <div class="post-meta">
                        <span class="post-meta-item"><strong>📌 ${post.topic}</strong></span>
                        <span class="post-meta-item post-type">${post.type}</span>
                    </div>

                    <div class="post-preview">${post.content.substring(0, 100)}...</div>

                    <div class="hashtags">
                        ${post.hashtags.map(tag => `<a href="#" onclick="return false">${tag}</a>`).join('')}
                    </div>

                    <span class="status-badge status-${post.status}">${post.status}</span>

                    <div class="post-actions">
                        <a href="${post.driveLink}" target="_blank" class="btn btn-download">📥 媒體資料夾</a>
                        ${post.mediaUrl ? `<a href="${post.mediaUrl}" target="_blank" class="btn btn-download">🎬 查看媒體</a>` : `<button class="btn btn-disabled">📥 媒體待補</button>`}
                    </div>
                </div>
            `).join('');
        }

        function filterPosts(platform) {
            // 更新按鍵狀態
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 重新渲染
            renderPosts(platform);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderPosts();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW');
        });
    </script>
</body>
</html>
