<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonaSNS — 每日帖文預覽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1em;
            color: #555;
        }

        .site-nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .site-nav a {
            padding: 10px 22px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .site-nav a.active {
            background: #667eea;
            color: white;
        }

        .site-nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* 月曆樣式 */
        .calendar-section {
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .calendar-header h2 {
            font-size: 1.15em;
            color: #2c3e50;
        }

        .calendar-nav {
            display: flex;
            gap: 6px;
        }

        .calendar-nav button {
            padding: 6px 11px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .calendar-nav button:hover {
            background: #5568d3;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: #667eea;
            padding: 6px 2px;
            font-size: 0.8em;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .calendar-day:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .calendar-day.empty {
            background: #f5f5f5;
            cursor: default;
            border-color: #f5f5f5;
        }

        .calendar-day.empty:hover {
            transform: none;
            box-shadow: none;
        }

        .calendar-day.has-post {
            border-color: #667eea;
            background: #f8faff;
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .calendar-day.selected .day-count {
            color: white;
        }

        .calendar-day.ob {
            border-left: 3px solid #667eea;
        }

        .calendar-day.okip {
            border-left: 3px solid #f39c12;
        }

        .calendar-day.blues {
            border-left: 3px solid #3498db;
        }

        .day-number {
            font-size: 1.1em;
            color: #2c3e50;
        }

        .calendar-day.selected .day-number {
            color: white;
        }

        .day-count {
            font-size: 0.75em;
            color: #667eea;
            margin-top: 2px;
        }

        /* 帖文網格 */
        .posts-section {
            margin-bottom: 30px;
        }

        .posts-section h3 {
            font-size: 1.3em;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 左右並排：左月曆 右帖文 */
        .main-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            align-items: start;
            margin-bottom: 40px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .post-card.okip {
            border-left-color: #f39c12;
        }

        .post-card.blues {
            border-left-color: #3498db;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .post-date {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
        }

        .post-platform {
            display: inline-block;
            padding: 5px 12px;
            background: #ecf0f1;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            color: #2c3e50;
        }

        .post-platform.okip {
            background: #fef3e2;
            color: #f39c12;
        }

        .post-platform.blues {
            background: #e3f2fd;
            color: #3498db;
        }

        .post-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .post-meta-item {
            padding: 5px 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85em;
            color: #555;
        }

        .post-type {
            font-weight: 600;
            color: #667eea;
        }

        .post-content {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

        .post-preview {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
            color: #555;
            margin: 10px 0;
            max-height: 120px;
            overflow: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .post-preview.expanded {
            max-height: none;
        }

        .image-prompt-block {
            margin: 12px 0;
            padding: 12px;
            border: 1px solid #f0c36c;
            border-radius: 10px;
            background: #fff9e9;
        }

        .image-prompt-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: #8a5a00;
            font-weight: 700;
            font-size: 0.9em;
        }

        .image-prompt-preview {
            border-left-color: #f39c12;
            background: #fffdf7;
            margin-bottom: 7px;
        }

        .prompt-copy {
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            color: white;
            background: #e67e22;
            font-weight: 600;
        }

        .expand-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            padding: 0;
            margin-top: 8px;
        }

        .expand-btn:hover {
            text-decoration: underline;
        }

        .hashtags {
            margin: 12px 0;
            font-size: 0.9em;
        }

        .hashtags a {
            color: #667eea;
            text-decoration: none;
            margin-right: 8px;
        }

        .hashtags a:hover {
            text-decoration: underline;
        }

        /* Threads 可複製版 */
        .threads-block {
            margin: 14px 0 4px;
            background: #f4f0fb;
            border: 1px solid #e0d6f5;
            border-radius: 10px;
            padding: 12px 14px;
        }

        .threads-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .threads-head .label {
            font-weight: 700;
            color: #6b3fa0;
            font-size: 0.85em;
            letter-spacing: 0.02em;
        }

        .threads-copy {
            background: #6b3fa0;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .threads-copy:hover { background: #57318a; }

        .threads-text {
            white-space: pre-wrap;
            word-break: break-word;
            color: #3a2d52;
            font-size: 0.9em;
            line-height: 1.55;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .threads-text.expanded { max-height: none; }

        .threads-toggle {
            background: none;
            border: none;
            color: #6b3fa0;
            font-weight: 600;
            font-size: 0.82em;
            cursor: pointer;
            padding: 4px 0 0;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-copy {
            background: #27ae60;
            color: white;
        }

        .btn-copy:hover {
            background: #229954;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
        }

        .btn-disabled {
            background: #bdc3c7;
            color: white;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-待起稿 {
            background: #ffe5e5;
            color: #c0392b;
        }

        .status-待確認 {
            background: #fff3e0;
            color: #d68910;
        }

        .status-已確認 {
            background: #e8f5e9;
            color: #27ae60;
        }

        .status-已發佈 {
            background: #e3f2fd;
            color: #2980b9;
        }

        footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.5);
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .copy-success {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .calendar-section {
                position: static;
                margin-bottom: 4px;
            }
        }

        @media (max-width: 768px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .filters {
                justify-content: flex-start;
                overflow-x: auto;
            }

            .post-actions {
                flex-direction: column;
            }

            .btn {
                flex: 1;
                min-width: auto;
            }

            .calendar-section {
                padding: 20px;
            }

            .weekday {
                font-size: 0.8em;
                padding: 8px;
            }

            .day-number {
                font-size: 0.9em;
            }

            .day-count {
                font-size: 0.65em;
            }
        }
    </style>
</head>

                content: ``,

                status: ''
            },
            {

                weekday: '日',
                platform: 'OKIP',

                type: '',

            },
            {
                date: '2026/11/18',
                weekday: '三',
                platform: 'OKIP',
                topic: '一周天氣',
                type: '天氣速報',
                content: ``,
                threads: ``,
                imagePrompt: ``,
                hashtags: [],
                mediaLink: null,
                status: ''
            }
        ];

        let currentMonth = 7;
        let currentYear = 2026;
        let selectedDate = null;
        let currentBrand = 'all';

        // 計算某月有多少帖文
        function getPostsForDate(dateStr) {
            return posts.filter(p => p.date === dateStr);
        }

        // 計算某天的品牌
        function getBrandsForDate(dateStr) {
            const dayPosts = getPostsForDate(dateStr);
            return [...new Set(dayPosts.map(p => p.platform))];
        }

        // 生成月曆
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth - 1, 1);
            const lastDay = new Date(currentYear, currentMonth, 0);
            const daysInMonth = lastDay.getDate();
            const startDate = firstDay.getDay();

            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = '';

            // 上月空白
            for (let i = 0; i < startDate; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendarGrid.appendChild(emptyDay);
            }

            // 本月日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}/${String(currentMonth).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
                const dayPosts = getPostsForDate(dateStr);
                const brands = getBrandsForDate(dateStr);

                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';

                if (dayPosts.length > 0) {
                    dayElement.classList.add('has-post');
                    brands.forEach(brand => {
                        if (brand === 'OB') dayElement.classList.add('ob');
                        if (brand === 'OKIP') dayElement.classList.add('okip');
                        if (brand === 'The Blues') dayElement.classList.add('blues');
                    });
                }

                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = day;

                if (dayPosts.length > 0) {
                    const dayCount = document.createElement('div');
                    dayCount.className = 'day-count';
                    dayCount.textContent = `${dayPosts.length}件`;
                    dayElement.appendChild(dayNumber);
                    dayElement.appendChild(dayCount);
                } else {
                    dayElement.appendChild(dayNumber);
                }

                dayElement.onclick = () => selectDate(dateStr, dayElement);

                calendarGrid.appendChild(dayElement);
            }

            document.getElementById('monthDisplay').textContent = `${currentYear}年 ${currentMonth}月`;
        }

        // 選擇日期
        function selectDate(dateStr, element) {
            document.querySelectorAll('.calendar-day.selected').forEach(el => {
                el.classList.remove('selected');
            });

            element.classList.add('selected');
            selectedDate = dateStr;
            renderPosts();
        }

        // 按品牌過濾
        function filterByBrand(brand) {
            currentBrand = brand;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderPosts();
        }

        // 渲染帖文
        function renderPosts() {
            console.log('🔍 renderPosts called, total posts:', posts.length);
            const container = document.getElementById('postsContainer');

            let filteredPosts = posts;

            // 按日期過濾
            if (selectedDate) {
                filteredPosts = filteredPosts.filter(p => p.date === selectedDate);
            }

            // 按品牌過濾
            if (currentBrand !== 'all') {
                filteredPosts = filteredPosts.filter(p => p.platform === currentBrand);
            }

            // 更新標題
            let title = `${currentYear}年${currentMonth}月`;
            if (selectedDate) {
                title += ` — ${selectedDate}`;
            }
            if (currentBrand !== 'all') {
                const brandNames = {'OB': 'OKIBLUES', 'OKIP': 'OKIPLAYGROUND'};
                title += ` — ${brandNames[currentBrand] || currentBrand}`;
            } else {
                title += ' — ';
                if (selectedDate) {
                    title += '全部品牌';
                } else {
                    title += '全部帖文';
                }
            }
            document.getElementById('postsTitle').textContent = title;

            if (filteredPosts.length === 0) {
                container.innerHTML = '<div class="empty-state">❌ 沒有符合條件的帖文</div>';
                return;
            }

            container.innerHTML = filteredPosts.map((post, idx) => {
                const previewId = `preview-${idx}`;
                const btnId = `expand-btn-${idx}`;
                const promptId = `prompt-${idx}`;
                const promptBtnId = `prompt-expand-btn-${idx}`;
                const threadsText = (post.threads || '').trim();
                const imagePrompt = (post.imagePrompt || '').trim();
                return `
                    <div class="post-card ${post.platform === 'OKIP' ? 'okip' : post.platform === 'The Blues' ? 'blues' : ''}">
                        <div class="post-header">
                            <div>
                                <div class="post-date">${post.date} (${post.weekday})</div>
                            </div>
                            <span class="post-platform ${post.platform === 'OKIP' ? 'okip' : post.platform === 'The Blues' ? 'blues' : ''}">${post.platform}</span>
                        </div>

                        <div class="post-meta">
                            <span class="post-meta-item"><strong>📌 ${post.topic}</strong></span>
                            <span class="post-meta-item post-type">${post.type}</span>
                        </div>

                        ${imagePrompt ? `
                        <div class="image-prompt-block">
                            <div class="image-prompt-head"><span>🎨 ChatGPT 圖片生成 Prompt（先附範例圖）</span><button class="prompt-copy" onclick="copyToClipboard(\`${imagePrompt.replace(/`/g, '\\`')}\`)">📋 複製 Prompt</button></div>
                            <div class="post-preview image-prompt-preview" id="${promptId}">${imagePrompt}</div>
                            <button class="expand-btn" id="${promptBtnId}" onclick="toggleExpand(document.getElementById('${promptBtnId}'), document.getElementById('${promptId}'))">▶ 展開 Prompt</button>
                        </div>` : ''}

                        <div class="post-preview" id="${previewId}">${post.content || '（尚未撰寫文案）'}</div>
                        ${post.content ? `<button class="expand-btn" id="${btnId}" onclick="toggleExpand(document.getElementById('${btnId}'), document.getElementById('${previewId}'))">▶ 展開全文</button>` : ''}

                        <div class="hashtags">
                            ${post.hashtags.map(tag => `<a href="#" onclick="return false">${tag}</a>`).join('')}
                        </div>

                        ${threadsText ? `
                        <div class="threads-block">
                            <div class="threads-head">
                                <span class="label">🧵 Threads 版</span>
                                <button class="threads-copy" onclick="copyThreads(this)">📋 複製</button>
                            </div>
                            <div class="threads-text">${threadsText.replace(/</g, '&lt;')}</div>
                            <button class="threads-toggle" onclick="toggleThreads(this)">▶ 展開</button>
                        </div>` : ''}

                        <span class="status-badge status-${post.status}">${post.status}</span>

                        <div class="post-actions">
                            ${post.content ? `<button class="btn btn-copy" onclick="copyToClipboard(\`${post.content.replace(/`/g, '\\`')}\`)">📋 複製全部</button>` : `<button class="btn btn-disabled">📋 尚無文案</button>`}
                            ${post.mediaLink ? `<a href="${post.mediaLink}" target="_blank" class="btn btn-download">📥 媒體資料夾</a>` : `<button class="btn btn-disabled">📥 媒體待補</button>`}
                        </div>
                    </div>
                `;
            }).join('');

            tidyThreadsToggles();
        }

        // Threads 版:複製 / 展開
        function copyThreads(btn) {
            const text = btn.closest('.threads-block').querySelector('.threads-text').innerText;
            navigator.clipboard.writeText(text).then(showCopySuccess);
        }

        function toggleThreads(btn) {
            const textEl = btn.closest('.threads-block').querySelector('.threads-text');
            textEl.classList.toggle('expanded');
            btn.textContent = textEl.classList.contains('expanded') ? '▲ 收起' : '▶ 展開';
        }

        // 隱藏不需要展開的 Threads 收合鈕(內容沒溢出時)
        function tidyThreadsToggles() {
            document.querySelectorAll('.threads-block').forEach(block => {
                const textEl = block.querySelector('.threads-text');
                const toggle = block.querySelector('.threads-toggle');
                if (textEl.scrollHeight <= textEl.clientHeight + 2) {
                    toggle.style.display = 'none';
                }
            });
        }

        // 複製功能
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showCopySuccess();
            });
        }

        function showCopySuccess() {
            const msg = document.createElement('div');
            msg.className = 'copy-success';
            msg.textContent = '✅ 已複製到剪貼簿';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        // 展開/收起
        function toggleExpand(btn, previewElement) {
            previewElement.classList.toggle('expanded');
            btn.textContent = previewElement.classList.contains('expanded') ? '▼ 收起' : '▶ 展開全文';
        }

        // 上月/下月
        function previousMonth() {
            if (currentMonth === 1) {
                currentMonth = 12;
                currentYear--;
            } else {
                currentMonth--;
            }
            selectedDate = null;
            renderCalendar();
            renderPosts();
        }

        function nextMonth() {
            if (currentMonth === 12) {
                currentMonth = 1;
                currentYear++;
            } else {
                currentMonth++;
            }
            selectedDate = null;
            renderCalendar();
            renderPosts();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ DOM loaded, posts count:', posts.length);
            console.log('📅 Month:', currentMonth, 'Year:', currentYear);
            console.log('🎨 Calling renderCalendar...');
            renderCalendar();
            console.log('📝 Calling renderPosts...');
            renderPosts();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW');
        });
    </script>
</body>
