<html lang="zh-TW">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonaSNS — 每日帖文預覽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1em;
            color: #555;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* 月曆樣式 */
        .calendar-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            font-size: 1.5em;
            color: #2c3e50;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            padding: 8px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .calendar-nav button:hover {
            background: #5568d3;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: #667eea;
            padding: 10px;
            font-size: 0.9em;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .calendar-day:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .calendar-day.empty {
            background: #f5f5f5;
            cursor: default;
            border-color: #f5f5f5;
        }

        .calendar-day.empty:hover {
            transform: none;
            box-shadow: none;
        }

        .calendar-day.has-post {
            border-color: #667eea;
            background: #f8faff;
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .calendar-day.selected .day-count {
            color: white;
        }

        .calendar-day.ob {
            border-left: 3px solid #667eea;
        }

        .calendar-day.okip {
            border-left: 3px solid #f39c12;
        }

        .calendar-day.blues {
            border-left: 3px solid #3498db;
        }

        .day-number {
            font-size: 1.1em;
            color: #2c3e50;
        }

        .calendar-day.selected .day-number {
            color: white;
        }

        .day-count {
            font-size: 0.75em;
            color: #667eea;
            margin-top: 2px;
        }

        /* 帖文網格 */
        .posts-section {
            margin-bottom: 30px;
        }

        .posts-section h3 {
            font-size: 1.3em;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .post-card.okip {
            border-left-color: #f39c12;
        }

        .post-card.blues {
            border-left-color: #3498db;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .post-date {
            font-size: 1.3em;
            font-weight: 700;
            color: #2c3e50;
        }

        .post-platform {
            display: inline-block;
            padding: 5px 12px;
            background: #ecf0f1;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            color: #2c3e50;
        }

        .post-platform.okip {
            background: #fef3e2;
            color: #f39c12;
        }

        .post-platform.blues {
            background: #e3f2fd;
            color: #3498db;
        }

        .post-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .post-meta-item {
            padding: 5px 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85em;
            color: #555;
        }

        .post-type {
            font-weight: 600;
            color: #667eea;
        }

        .post-content {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

        .post-preview {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
            color: #555;
            margin: 10px 0;
            max-height: 120px;
            overflow: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .post-preview.expanded {
            max-height: none;
        }

        .expand-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            padding: 0;
            margin-top: 8px;
        }

        .expand-btn:hover {
            text-decoration: underline;
        }

        .hashtags {
            margin: 12px 0;
            font-size: 0.9em;
        }

        .hashtags a {
            color: #667eea;
            text-decoration: none;
            margin-right: 8px;
        }

        .hashtags a:hover {
            text-decoration: underline;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-copy {
            background: #27ae60;
            color: white;
        }

        .btn-copy:hover {
            background: #229954;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
        }

        .btn-disabled {
            background: #bdc3c7;
            color: white;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 10px;
        }

            background: #ffe5e5;
            color: #c0392b;
        }

        .status-待確認 {
            background: #fff3e0;
            color: #d68910;
        }

        .status-已確認 {
            background: #e8f5e9;
            color: #27ae60;
        }

        .status-已發佈 {
            background: #e3f2fd;
            color: #2980b9;
        }

        footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 40px;
            padding-top: 20px;

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .copy-success {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .filters {

                overflow-x: auto;
            }

            .post-actions {
                flex-direction: column;
            }

            .btn {
                flex: 1;
                min-width: auto;
            }

            .calendar-section {
                padding: 20px;
            }

            .weekday {
                font-size: 0.8em;
                padding: 8px;
            }

            .day-number {
                font-size: 0.9em;
            }

            .day-count {
                font-size: 0.65em;
            }
        }
    </style>

                const dateStr = `${currentYear}/${String(currentMonth).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
