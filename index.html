    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;

            background-clip: text;
        }

        header p {
            font-size: 1.1em;
            color: #555;
        }

        .filters {

            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* 月曆樣式 */
        .calendar-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            font-size: 1.5em;
            color: #2c3e50;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            padding: 8px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .calendar-nav button:hover {
            background: #5568d3;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: #667eea;
            padding: 10px;
            font-size: 0.9em;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .calendar-day:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .calendar-day.empty {
            background: #f5f5f5;
            cursor: default;
            border-color: #f5f5f5;
        }

        .calendar-day.empty:hover {
            transform: none;
            box-shadow: none;
        }

        .calendar-day.has-post {
            border-color: #667eea;
            background: #f8faff;
        }

        .calendar-day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .calendar-day.selected .day-count {
            color: white;
        }

        .calendar-day.ob {
            border-left: 3px solid #667eea;
        }

        .calendar-day.okip {
            border-left: 3px solid #f39c12;
        }

        .calendar-day.blues {
            border-left: 3px solid #3498db;
        }

        .day-number {
            font-size: 1.1em;
            color: #2c3e50;
        }

        .calendar-day.selected .day-number {
            color: white;
        }

        .day-count {
            font-size: 0.75em;
            color: #667eea;
            margin-top: 2px;
        }

        }

            font-size: 1.3em;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .post-card.okip {

        }

        .post-card.blues {
            border-left-color: #3498db;
        }

            font-weight: 700;
            color: #2c3e50;
        }

            font-size: 0.9em;
            font-weight: 600;
            color: #2c3e50;

            background: #fef3e2;
            color: #f39c12;
        }

        .post-platform.blues {
            background: #e3f2fd;
            color: #3498db;

            color: #555;

            font-weight: 600;
            color: #667eea;
        }

        .post-content {
            margin-bottom: 15px;
            line-height: 1.6;
            color: #333;
        }

            white-space: pre-wrap;
            word-wrap: break-word;

        }

            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            padding: 0;

            text-decoration: underline;
        }

            margin: 12px 0;
            font-size: 0.9em;
        }

        .hashtags a {
            color: #667eea;
            text-decoration: none;
            margin-right: 8px;
        }

        .hashtags a:hover {
            text-decoration: underline;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

            min-width: 120px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-copy {
            background: #27ae60;
            color: white;
        }

        .btn-copy:hover {
            background: #229954;
        }

        .btn-download {
            background: #667eea;
            color: white;

            background: #5568d3;

        .btn-disabled {

            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .copy-success {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }

                padding: 8px;
            }

            .day-number {
                font-size: 0.9em;
            }

            .day-count {
                font-size: 0.65em;
            }
        }
    </style>

        let currentMonth = 6;
        let currentYear = 2026;
        let selectedDate = null;
        let currentBrand = 'all';

        // 計算某月有多少帖文
        function getPostsForDate(dateStr) {
            return posts.filter(p => p.date === dateStr);
        }

        // 計算某天的品牌
        function getBrandsForDate(dateStr) {
            const dayPosts = getPostsForDate(dateStr);
            return [...new Set(dayPosts.map(p => p.platform))];
        }

        // 生成月曆
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth - 1, 1);
            const lastDay = new Date(currentYear, currentMonth, 0);
            const daysInMonth = lastDay.getDate();
            const startDate = firstDay.getDay();

            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = '';

            // 上月空白
            for (let i = 0; i < startDate; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendarGrid.appendChild(emptyDay);
            }

            // 本月日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}/${String(currentMonth).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
                const dayPosts = getPostsForDate(dateStr);
                const brands = getBrandsForDate(dateStr);

                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';

                if (dayPosts.length > 0) {
                    dayElement.classList.add('has-post');
                    brands.forEach(brand => {
                        if (brand === 'OB') dayElement.classList.add('ob');
                        if (brand === 'OKIP') dayElement.classList.add('okip');
                        if (brand === 'The Blues') dayElement.classList.add('blues');
                    });
                }

                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = day;

                if (dayPosts.length > 0) {
                    const dayCount = document.createElement('div');
                    dayCount.className = 'day-count';
                    dayCount.textContent = `${dayPosts.length}件`;
                    dayElement.appendChild(dayNumber);
                    dayElement.appendChild(dayCount);
                } else {
                    dayElement.appendChild(dayNumber);
                }

                dayElement.onclick = () => selectDate(dateStr, dayElement);

                calendarGrid.appendChild(dayElement);
            }

            document.getElementById('monthDisplay').textContent = `${currentYear}年 ${currentMonth}月`;
        }

        // 選擇日期
        function selectDate(dateStr, element) {
            document.querySelectorAll('.calendar-day.selected').forEach(el => {
                el.classList.remove('selected');
            });

            element.classList.add('selected');
            selectedDate = dateStr;
            renderPosts();
        }

        // 按品牌過濾
        function filterByBrand(brand) {
            currentBrand = brand;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderPosts();
        }

        // 渲染帖文
        function renderPosts() {
            const container = document.getElementById('postsContainer');

            let filteredPosts = posts;

            // 按日期過濾
            if (selectedDate) {
                filteredPosts = filteredPosts.filter(p => p.date === selectedDate);
            }

            // 按品牌過濾
            if (currentBrand !== 'all') {
                filteredPosts = filteredPosts.filter(p => p.platform === currentBrand);
            }

            // 更新標題
            let title = `${currentYear}年${currentMonth}月`;
            if (selectedDate) {
                title += ` — ${selectedDate}`;
            }
            if (currentBrand !== 'all') {
                const brandNames = {'OB': 'OKIBLUES', 'OKIP': 'OKIPLAYGROUND'};
                title += ` — ${brandNames[currentBrand] || currentBrand}`;
            } else {
                title += ' — ';
                if (selectedDate) {
                    title += '全部品牌';
                } else {
                    title += '全部帖文';
                }
            }
            document.getElementById('postsTitle').textContent = title;

            if (filteredPosts.length === 0) {
                container.innerHTML = '<div class="empty-state">❌ 沒有符合條件的帖文</div>';
                return;
            }

            container.innerHTML = filteredPosts.map((post, idx) => {
                const previewId = `preview-${idx}`;
                const btnId = `expand-btn-${idx}`;
                return `
                    <div class="post-card ${post.platform === 'OKIP' ? 'okip' : post.platform === 'The Blues' ? 'blues' : ''}">
                        <div class="post-header">
                            <div>
                                <div class="post-date">${post.date} (${post.weekday})</div>
                            </div>
                            <span class="post-platform ${post.platform === 'OKIP' ? 'okip' : post.platform === 'The Blues' ? 'blues' : ''}">${post.platform}</span>
                        </div>

                        <div class="post-meta">
                            <span class="post-meta-item"><strong>📌 ${post.topic}</strong></span>
                            <span class="post-meta-item post-type">${post.type}</span>
                        </div>

                        <div class="post-preview" id="${previewId}">${post.content}</div>
                        <button class="expand-btn" id="${btnId}" onclick="toggleExpand(document.getElementById('${btnId}'), document.getElementById('${previewId}'))">▶ 展開全文</button>

                        <div class="hashtags">
                            ${post.hashtags.map(tag => `<a href="#" onclick="return false">${tag}</a>`).join('')}
                        </div>

                        <span class="status-badge status-${post.status}">${post.status}</span>

                        <div class="post-actions">
                            <button class="btn btn-copy" onclick="copyToClipboard(\`${post.content.replace(/`/g, '\\`')}\`)">📋 複製全部</button>
                            ${post.mediaLink ? `<a href="${post.mediaLink}" target="_blank" class="btn btn-download">📥 媒體資料夾</a>` : `<button class="btn btn-disabled">📥 媒體待補</button>`}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 複製功能
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showCopySuccess();
            });
        }

        function showCopySuccess() {
            const msg = document.createElement('div');
            msg.className = 'copy-success';
            msg.textContent = '✅ 已複製到剪貼簿';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        // 展開/收起
        function toggleExpand(btn, previewElement) {
            previewElement.classList.toggle('expanded');
            btn.textContent = previewElement.classList.contains('expanded') ? '▼ 收起' : '▶ 展開全文';
        }

        // 上月/下月
        function previousMonth() {
            if (currentMonth === 1) {
                currentMonth = 12;
                currentYear--;
            } else {
                currentMonth--;
            }
            selectedDate = null;
            renderCalendar();
            renderPosts();
        }

        function nextMonth() {
            if (currentMonth === 12) {
                currentMonth = 1;
                currentYear++;
            } else {
                currentMonth++;
            }
            selectedDate = null;
            renderCalendar();
            renderPosts();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            renderPosts();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-TW');
        });
    </script>
