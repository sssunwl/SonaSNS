name: OKIPLAYGROUND Weekly Weather

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC: Monday 16:58 = Tuesday 01:58 JST.
    - cron: '58 16 * * 1'

permissions:
  contents: write

concurrency:
  group: okiplayground-weekly-weather
  cancel-in-progress: false

jobs:
  publish-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate forecast facts, post copy, and ChatGPT image prompt
        run: python tools/generate_okiplayground_weather.py
      - name: Commit the weekly forecast package
        run: |
          git config user.name "SonaSNS Weather Bot"
          git config user.email "noreply@github.com"
          git add weather/
          if git diff --cached --quiet; then
            echo "No forecast changes to commit."
          else
            git commit -m "chore(okiplayground): update weekly weather forecast"
            git push
          fi
      - name: Notify Discord when generation fails
        if: failure()
        env:
          DISCORD_WEBHOOK_SONA: ${{ secrets.DISCORD_WEBHOOK_SONA }}
        run: |
          python3 -c "from _discord import notify_discord; notify_discord('❌ OKIPLAYGROUND 每週天氣速報產生失敗，舊版下載頁已保留。請至 GitHub Actions 重新執行。')"
