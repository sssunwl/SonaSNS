name: Auto Sync Posts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # 每天 UTC 22:00（台灣時間早上 6:00）

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth-httplib2 google-auth-oauthlib

      - name: Sync posts from Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python3 sync_posts.py

      - name: Sync YouTube channel stats
        continue-on-error: true   # 缺金鑰時不擋整條流程
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 sync_youtube.py okiblues

      - name: Sync Google Maps reviews
        continue-on-error: true   # Places API 需 billing，缺金鑰時不擋整條流程
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python3 sync_maps.py okiblues

      - name: Commit and push if changed
        run: |
          git config --local user.name "SonaSNS Bot"
          git config --local user.email "noreply@github.com"

          git add index.html okiblues.html
          if git diff --cached --quiet; then
            echo "ℹ️ 沒有新更改，跳過提交"
          else
            echo "📝 發現更改，正在提交..."
            git commit -m "chore: auto sync posts + YouTube/Maps data" -m "時間：$(date -u '+%Y-%m-%d %H:%M:%S UTC')" -m "Co-Authored-By: SonaSNS Bot <noreply@github.com>"
            git push
            echo "✅ 已推送到 GitHub"
          fi

      - name: Workflow summary
        if: always()
        run: |
          echo "🔄 同步完成"
          echo "📊 時間：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
